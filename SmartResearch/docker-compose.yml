version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: smartresearch-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import

  chromadb:
    image: chromadb/chroma:latest
    container_name: smartresearch-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/data
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data

  redis:
    image: redis:7-alpine
    container_name: smartresearch-redis
    ports:
      - "6379:6379"

networks:
  default:
    name: smartresearch-network
