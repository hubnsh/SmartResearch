# ============================================================
# SmartResearch CI 流水线
# 触发条件：push 到 main、PR 到 main、手动 dispatch
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # 允许手动触发

jobs:
  # ----------------------------------------------------------
  # Job 1: 代码检查（lint + 格式化）
  # ----------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff==0.8.0

      - name: Ruff lint（检查代码错误）
        run: ruff check SmartResearch/src/

      - name: Ruff format（检查格式一致性）
        run: ruff format --check SmartResearch/src/

  # ----------------------------------------------------------
  # Job 2: 安全审计（依赖漏洞扫描）
  # ----------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Install project dependencies
        run: pip install -r SmartResearch/requirements.txt

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit

  # ----------------------------------------------------------
  # Job 3: 自动化测试（pytest + 覆盖率）
  # ----------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [lint, security]   # lint 和安全审计通过后才跑测试

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('SmartResearch/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r SmartResearch/requirements.txt
          pip install pytest-cov==6.0.0

      - name: Run tests with coverage
        run: |
          cd SmartResearch
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: SmartResearch/.coverage
          retention-days: 7
