# ============================================================
# SmartResearch CI 流水线
# 触发条件：push 到 main、PR 到 main、手动 dispatch
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------
  # Job 1: 自动化测试（pytest）
  # ----------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('SmartResearch/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r SmartResearch/requirements.txt
          pip install pytest-cov==6.0.0

      - name: Create .env from template
        run: |
          cp SmartResearch/.env.example SmartResearch/.env

      - name: Run tests with coverage
        run: |
          cd SmartResearch
          python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: SmartResearch/.coverage
          retention-days: 7
