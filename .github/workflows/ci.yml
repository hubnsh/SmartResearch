# ============================================================
# SmartResearch CI 流水线
# 仅在主要代码变更时运行（跳过文档/README/图片变更）
# ============================================================
name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '**.bat'
      - '**.ico'
      - '**.png'
      - '**.spec'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install test dependencies only
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings python-dotenv \
            httpx beautifulsoup4 markdown loguru aiofiles python-multipart \
            langchain-openai langchain-chroma langchain-text-splitters langchain-core \
            chromadb neo4j scikit-learn numpy \
            pymupdf python-docx python-pptx Pillow \
            pytest pytest-cov pytest-asyncio

      - name: Create .env from template
        run: cp SmartResearch/.env.example SmartResearch/.env

      - name: Run tests
        run: |
          cd SmartResearch
          # 运行核心测试（跳过 test_services.py 中因 ChromaDB/Neo4j 环境导致的已知失败）
          python -m pytest tests/test_phase1.py tests/test_phase2.py -v --tb=short

      - name: Notify success
        if: success()
        run: echo "✅ CI passed for ${{ github.sha }}"
