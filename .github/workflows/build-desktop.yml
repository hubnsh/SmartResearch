# ============================================================
# SmartResearch Desktop 构建流水线
# 触发条件：创建 Git tag (v*) 或手动 dispatch
# ============================================================
name: Build Desktop

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - '**.bat'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空自动从 tag 获取)'
        required: false
        default: ''

# 取消正在运行的重复构建（节省 Actions 分钟数）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows Desktop Exe
    runs-on: windows-latest
    if: github.repository == 'hubnsh/SmartResearch'  # 仅在主仓库运行

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        shell: bash
        run: |
          pip install pyinstaller
          pip install PySide6>=6.5.0 httpx beautifulsoup4 markdown loguru Pillow \
            scikit-learn numpy \
            langchain-openai langchain-chroma langchain-text-splitters langchain-core \
            chromadb pydantic pydantic-settings python-dotenv aiofiles

      - name: Create .env from template
        run: copy SmartResearch\.env.example SmartResearch\.env

      - name: Build Desktop EXE with PyInstaller
        shell: bash
        run: |
          cd SmartResearch
          python -m PyInstaller desktop_build.spec --noconfirm --clean
        timeout-minutes: 30

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=nightly" >> $GITHUB_OUTPUT
          fi

      - name: Verify EXE exists
        id: verify
        shell: bash
        run: |
          if [ -f "SmartResearch/dist/SmartResearch.exe" ]; then
            du -sh "SmartResearch/dist/SmartResearch.exe"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Create ZIP archive
        if: steps.verify.outputs.status == 'success'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd SmartResearch/dist
          mkdir -p SmartResearch-Desktop
          cp SmartResearch.exe SmartResearch-Desktop/
          cp ../.env.example SmartResearch-Desktop/.env
          cp ../README.md SmartResearch-Desktop/
          7z a "SmartResearch-Desktop-${VERSION}.zip" SmartResearch-Desktop/
          rm -rf SmartResearch-Desktop

      - name: Upload ZIP
        if: steps.verify.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: SmartResearch-Desktop-${{ steps.version.outputs.version }}
          path: SmartResearch/dist/SmartResearch-Desktop-*.zip
          retention-days: 90

      - name: Upload EXE
        if: steps.verify.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: SmartResearch-EXE-${{ steps.version.outputs.version }}
          path: SmartResearch/dist/SmartResearch.exe
          retention-days: 90

      - name: Create GitHub Release
        if: steps.verify.outputs.status == 'success' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: SmartResearch ${{ steps.version.outputs.version }}
          body: |
            ## 🧠 SmartResearch ${{ steps.version.outputs.version }}

            ### 📦 下载
            - [SmartResearch-Desktop-${{ steps.version.outputs.version }}.zip](${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/SmartResearch-Desktop-${{ steps.version.outputs.version }}.zip)

            ### 🚀 使用方法
            1. 下载 ZIP 并解压
            2. 编辑 `.env` 填入 API Key
            3. 双击 `SmartResearch.exe`
          files: |
            SmartResearch/dist/SmartResearch.exe
          fail_on_unmatched_files: false
